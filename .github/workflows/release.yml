name: Release

on:
  workflow_dispatch:
    inputs:
      tag_name:
        description: Release tag to create, for example v2.1.5
        required: true
        type: string

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

permissions:
  contents: write

jobs:
  release-version:
    name: Resolve Release Version
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.tag.outputs.version }}
    steps:
      - name: Validate release tag
        id: tag
        run: |
          set -euo pipefail
          tag="${{ inputs.tag_name }}"
          if [[ ! "${tag}" =~ ^v[0-9]+\.[0-9]+\.[0-9]+([._-][0-9A-Za-z]+)*$ ]]; then
            echo "Release tag must look like v2.1.5, got: ${tag}" >&2
            exit 1
          fi
          echo "version=${tag#v}" >> "${GITHUB_OUTPUT}"

  validate-release-readiness:
    name: Validate release readiness
    needs: release-version
    uses: sima-neat/.github/.github/workflows/release-engineering.yml@main
    with:
      release_version: ${{ needs.release-version.outputs.version }}
    secrets:
      app_id: ${{ secrets.NEAT_RELEASES_APP_ID }}
      app_private_key: ${{ secrets.NEAT_RELEASES_APP_PRIVATE_KEY }}

  create-release:
    name: Create Draft Prerelease
    needs: validate-release-readiness
    runs-on: ubuntu-latest

    steps:
      - name: Verify maintainer permission
        env:
          GH_TOKEN: ${{ github.token }}
          ACTOR: ${{ github.actor }}
          REPO: ${{ github.repository }}
        run: |
          set -euo pipefail
          python3 - <<'PY'
          import json
          import os
          import sys
          import urllib.request

          actor = os.environ["ACTOR"]
          repo = os.environ["REPO"]
          token = os.environ["GH_TOKEN"]
          req = urllib.request.Request(
              f"https://api.github.com/repos/{repo}/collaborators/{actor}/permission",
              headers={
                  "Accept": "application/vnd.github+json",
                  "Authorization": f"Bearer {token}",
                  "X-GitHub-Api-Version": "2022-11-28",
              },
          )
          with urllib.request.urlopen(req) as resp:
              permission = json.loads(resp.read().decode("utf-8")).get("permission", "")

          if permission not in {"admin", "maintain"}:
              print(f"Actor {actor} has repository permission '{permission}', but release creation requires admin or maintain.", file=sys.stderr)
              sys.exit(1)
          print(f"Actor {actor} authorized with repository permission '{permission}'.")
          PY

      - name: Check out repository
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Validate release tag
        id: tag
        run: |
          set -euo pipefail
          tag="${{ inputs.tag_name }}"
          if [[ ! "${tag}" =~ ^v[0-9]+\.[0-9]+\.[0-9]+([._-][0-9A-Za-z]+)*$ ]]; then
            echo "Release tag must look like v2.1.5, got: ${tag}" >&2
            exit 1
          fi
          if git rev-parse -q --verify "refs/tags/${tag}" >/dev/null; then
            echo "Tag already exists locally: ${tag}" >&2
            exit 1
          fi
          if git ls-remote --exit-code --tags origin "refs/tags/${tag}" >/dev/null 2>&1; then
            echo "Tag already exists on origin: ${tag}" >&2
            exit 1
          fi
          echo "tag=${tag}" >> "${GITHUB_OUTPUT}"

      - name: Generate release notes from commits
        run: |
          set -euo pipefail
          tag="${{ steps.tag.outputs.tag }}"
          previous_tag="$(git describe --tags --abbrev=0 HEAD 2>/dev/null || true)"

          {
            echo "## ${tag}"
            echo
            if [[ -n "${previous_tag}" ]]; then
              echo "Changes since ${previous_tag}:"
              range="${previous_tag}..HEAD"
            else
              echo "Changes in this release:"
              range="HEAD"
            fi
            echo

            if [[ -n "$(git log --first-parent --format=%H "${range}")" ]]; then
              git log --first-parent --reverse --pretty=format:'- %s (%h)' "${range}"
              echo
            else
              echo "- No commits found since ${previous_tag}."
            fi

            echo
            echo "Review and edit these notes before publishing the release."
          } > release-notes.md

          cat release-notes.md

      - name: Create and push tag
        run: |
          set -euo pipefail
          tag="${{ steps.tag.outputs.tag }}"
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git tag -a "${tag}" -m "Release ${tag}"
          git push origin "refs/tags/${tag}"

      - name: Create draft prerelease with commit notes
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail
          tag="${{ steps.tag.outputs.tag }}"
          gh release create "${tag}" \
            --draft \
            --prerelease \
            --notes-file release-notes.md \
            --title "${tag}" \
            --verify-tag

      - name: Build trigger note
        run: |
          echo "Pushed ${{ steps.tag.outputs.tag }}. The Vulcan CI workflow is triggered by the tag push."
