name: Build

on:
  push:
  pull_request:
  workflow_dispatch:

jobs:
  build-test:
    name: Build wheel and test
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Install test and build dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install build
          python -m pip install -r dev-requirements.txt

      - name: Set package version
        run: |
          if [[ "${GITHUB_REF_TYPE}" == "tag" ]]; then
            version="$(python scripts/set_build_version.py --tag "${GITHUB_REF_NAME}")"
          else
            ref_name="${GITHUB_HEAD_REF:-${GITHUB_REF_NAME}}"
            version="$(python scripts/set_build_version.py --ref "${ref_name}" --sha "${GITHUB_SHA}")"
          fi
          echo "Building sima-cli ${version}"

      - name: Build wheel
        id: build-wheel
        run: |
          python -m build --wheel
          ls -lh dist/*.whl

      - name: Install built wheel
        run: |
          python -m pip install dist/*.whl

      - name: Run unit tests
        id: unit-tests
        run: |
          scripts/run-tests.sh unit

      - name: Run compatibility tests
        if: always() && steps.build-wheel.outcome == 'success'
        run: |
          python scripts/check_py_compatibility.py sima_cli
          scripts/run-tests.sh compat --versions "3.12" --strict

      - name: Delete wheel
        if: always()
        run: |
          rm -f dist/*.whl
          find dist -maxdepth 1 -type f -print
