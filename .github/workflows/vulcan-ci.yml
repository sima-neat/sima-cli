name: Vulcan CI

run-name: ${{ github.event.head_commit.message || github.event.pull_request.title || github.ref_name || 'Vulcan CI' }} (${{ vars.VULCAN_ENV || 'dev' }})

on:
  push:
    branches:
      - "**"
    tags:
      - "*"
  pull_request:
  workflow_dispatch: {}

permissions:
  actions: write
  contents: read
  id-token: write
  packages: read

concurrency:
  group: ${{ github.repository }}-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: ${{ github.ref_type == 'branch' }}

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

jobs:
  build:
    name: Build sima-cli
    runs-on: ubuntu-latest
    outputs:
      branch_key: ${{ steps.meta.outputs.branch_key }}
      ref_name: ${{ steps.meta.outputs.ref_name }}
      short_sha: ${{ steps.meta.outputs.short_sha }}
      version: ${{ steps.meta.outputs.version }}

    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Resolve build metadata
        id: meta
        run: |
          set -euo pipefail
          if [[ "${GITHUB_REF_TYPE}" == "tag" ]]; then
            version="$(python scripts/set_build_version.py --tag "${GITHUB_REF_NAME}")"
          else
            ref_name="${GITHUB_HEAD_REF:-${GITHUB_REF_NAME}}"
            version="$(python scripts/set_build_version.py --ref "${ref_name}" --sha "${GITHUB_SHA}")"
          fi
          ref_name="${GITHUB_HEAD_REF:-${GITHUB_REF_NAME}}"
          branch_key="$(python3 - <<'PY'
          import os
          from urllib.parse import quote
          ref_name = os.environ.get("GITHUB_HEAD_REF") or os.environ["GITHUB_REF_NAME"]
          print(quote(ref_name, safe=""))
          PY
          )"
          short_sha="$(printf '%s' "${GITHUB_SHA}" | cut -c1-12)"
          {
            echo "version=${version}"
            echo "ref_name=${ref_name}"
            echo "branch_key=${branch_key}"
            echo "short_sha=${short_sha}"
          } >> "${GITHUB_OUTPUT}"
          echo "Building sima-cli ${version}"

      - name: Build and test
        run: |
          set -euo pipefail

          python3 -m venv .venv
          source .venv/bin/activate
          python -m pip install --upgrade pip
          python -m pip install build
          python -m pip install -r dev-requirements.txt

          python -m build --wheel

          python - <<'PY'
          import hashlib
          import json
          import os
          import textwrap
          import zipfile
          from pathlib import Path

          dist = Path("dist")
          wheel = sorted(dist.glob("*.whl"))[-1]
          version = wheel.name.split("-")[1]
          package = dist / f"sima-cli-package-{version}.zip"
          metadata = {
              "wheel": wheel.name,
              "helpers": [
                  "linux-mac.sh",
                  "windows.bat",
              ],
              "commit": os.environ["GITHUB_SHA"],
              "ref": os.environ.get("GITHUB_HEAD_REF") or os.environ["GITHUB_REF_NAME"],
          }

          with zipfile.ZipFile(package, "w", compression=zipfile.ZIP_DEFLATED) as zf:
              zf.write(wheel, wheel.name)
              zf.write("scripts/install/linux-mac.sh", "linux-mac.sh")
              zf.write("scripts/install/windows.bat", "windows.bat")
              zf.writestr("install_metadata.json", json.dumps(metadata, indent=2) + "\n")

          target_stub = dist / "install.py"
          target_stub.write_text(Path("scripts/install/install.py").read_text(encoding="utf-8"), encoding="utf-8")
          package_installer = dist / "install_vulcan_package.py"
          package_installer.write_text(textwrap.dedent(r'''
              #!/usr/bin/env python3
              """Install the downloaded sima-cli Vulcan package."""

              from __future__ import annotations

              import platform
              import subprocess
              import tempfile
              import zipfile
              from pathlib import Path


              def find_one(root: Path, pattern: str) -> Path:
                  matches = sorted(root.glob(pattern))
                  if not matches:
                      raise SystemExit(f"Unable to find {pattern} under {root}")
                  return matches[-1]


              def main() -> int:
                  package = find_one(Path.cwd(), "sima-cli-package-*.zip")
                  with tempfile.TemporaryDirectory(prefix="sima-cli-vulcan-install-") as tmp:
                      package_dir = Path(tmp) / "package"
                      package_dir.mkdir(parents=True, exist_ok=True)
                      with zipfile.ZipFile(package) as zf:
                          zf.extractall(package_dir)

                      wheel = find_one(package_dir, "*.whl")
                      if platform.system().lower() == "windows":
                          helper = find_one(package_dir, "windows.bat")
                          cmd = ["cmd.exe", "/c", str(helper), str(wheel)]
                      else:
                          helper = find_one(package_dir, "linux-mac.sh")
                          helper.chmod(helper.stat().st_mode | 0o755)
                          cmd = ["bash", str(helper), str(wheel)]
                      subprocess.run(cmd, check=True)
                  return 0


              if __name__ == "__main__":
                  raise SystemExit(main())
              ''').lstrip(), encoding="utf-8")
          package_installer.chmod(0o755)

          resources = [
              package_installer.name,
              package.name,
          ]

          def sha256(path: Path) -> str:
              h = hashlib.sha256()
              with path.open("rb") as f:
                  for chunk in iter(lambda: f.read(1024 * 1024), b""):
                      h.update(chunk)
              return h.hexdigest()

          total_size = sum((dist / resource).stat().st_size for resource in resources)
          metadata_json = {
              "name": "gh:sima-neat/sima-cli",
              "version": version,
              "release": "",
              "description": "SiMa.ai command-line tooling",
              "platforms": [],
              "resources": resources,
              "resources-checksum": {
                  resource: sha256(dist / resource)
                  for resource in resources
              },
              "selectable-resources": [],
              "size": {
                  "download": f"{max(1, (total_size + 1023) // 1024)}KB",
                  "install": f"{max(1, (total_size + 1023) // 1024)}KB",
              },
              "installation": {
                  "script": "python3 install_vulcan_package.py || python install_vulcan_package.py",
                  "post-message": "[bold]sima-cli installed successfully.[/bold]\n",
              },
          }
          metadata_path = dist / "metadata.json"
          metadata_path.write_text(json.dumps(metadata_json, indent=2) + "\n", encoding="utf-8")
          print(f"Created {package}")
          print(f"Created {target_stub}")
          print(f"Created {package_installer}")
          print(f"Created {metadata_path}")
          PY

          python -m pip install dist/*.whl
          scripts/run-tests.sh unit
          python scripts/check_py_compatibility.py sima_cli --targets "3.8,3.9,3.10,3.11,3.12,3.13,3.14"

      - name: Validate dist artifacts
        run: |
          set -euo pipefail

          mapfile -t WHEELS < <(find dist -maxdepth 1 -type f -name '*.whl' | sort)
          mapfile -t PACKAGES < <(find dist -maxdepth 1 -type f -name 'sima-cli-package-*.zip' | sort)
          test -f dist/install.py
          test -f dist/install_vulcan_package.py
          test -f dist/metadata.json
          python3 -m json.tool dist/metadata.json >/dev/null

          if [[ "${#WHEELS[@]}" -ne 1 || "${#PACKAGES[@]}" -ne 1 ]]; then
            echo "Expected exactly one sima-cli wheel and one installer package." >&2
            echo "wheels: ${#WHEELS[@]}" >&2
            printf '  %s\n' "${WHEELS[@]}" >&2 || true
            echo "packages: ${#PACKAGES[@]}" >&2
            printf '  %s\n' "${PACKAGES[@]}" >&2 || true
            exit 1
          fi

          python3 - <<'PY'
          import zipfile
          from pathlib import Path

          package = sorted(Path("dist").glob("sima-cli-package-*.zip"))[-1]
          with zipfile.ZipFile(package) as zf:
              names = set(zf.namelist())
          required = {"linux-mac.sh", "windows.bat", "install_metadata.json"}
          missing = sorted(required - names)
          if missing:
              raise SystemExit(f"{package} is missing {missing}")
          if not any(name.endswith(".whl") for name in names):
              raise SystemExit(f"{package} does not contain a wheel")

          import json
          metadata = json.loads(Path("dist/metadata.json").read_text(encoding="utf-8"))
          resources = metadata.get("resources", [])
          required_resources = {"install_vulcan_package.py", package.name}
          missing_resources = sorted(required_resources - set(resources))
          if missing_resources:
              raise SystemExit(f"metadata.json is missing resources: {missing_resources}")
          for resource in resources:
              if not (Path("dist") / resource).is_file():
                  raise SystemExit(f"metadata.json references missing resource: {resource}")
          PY
          ls -lh dist

      - name: Upload dist artifact
        uses: actions/upload-artifact@v7
        with:
          name: sima-cli-dist
          path: dist/*
          if-no-files-found: error
          retention-days: 3

  compatibility-test:
    name: Compatibility Python ${{ matrix.python-version }}
    runs-on: ubuntu-latest
    needs: build
    strategy:
      fail-fast: false
      matrix:
        python-version:
          - "3.8"
          - "3.9"
          - "3.10"
          - "3.11"
          - "3.12"
          - "3.13"
          - "3.14"

    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v6
        with:
          python-version: ${{ matrix.python-version }}

      - name: Download built dist
        uses: actions/download-artifact@v8
        with:
          name: sima-cli-dist
          path: dist

      - name: Set package version
        run: |
          set -euo pipefail
          if [[ "${GITHUB_REF_TYPE}" == "tag" ]]; then
            version="$(python scripts/set_build_version.py --tag "${GITHUB_REF_NAME}")"
          else
            ref_name="${GITHUB_HEAD_REF:-${GITHUB_REF_NAME}}"
            version="$(python scripts/set_build_version.py --ref "${ref_name}" --sha "${GITHUB_SHA}")"
          fi
          echo "Testing sima-cli ${version}"

      - name: Run compatibility tests
        run: |
          set -euo pipefail
          wheel="$(find dist -maxdepth 1 -type f -name 'sima_cli-*.whl' -print -quit)"
          if [[ -z "$wheel" ]]; then
            echo "No sima-cli wheel found in dist" >&2
            exit 1
          fi
          python scripts/check_py_compatibility.py sima_cli --targets "${{ matrix.python-version }}"
          scripts/run-tests.sh compat --versions "${{ matrix.python-version }}" --strict --wheel "$wheel"

  resolve-vulcan-config:
    name: Resolve Vulcan Config
    needs: build
    uses: sima-neat/.github/.github/workflows/vulcan-resolve-config.yml@main
    with:
      vulcan_env: ${{ vars.VULCAN_ENV || 'dev' }}

  publish-vulcan-artifacts:
    name: Publish to Vulcan
    needs:
      - resolve-vulcan-config
      - build
      - compatibility-test
    uses: sima-neat/.github/.github/workflows/vulcan-publish-artifacts.yml@main
    with:
      aws_region: ${{ needs.resolve-vulcan-config.outputs.aws_region }}
      environment_name: ${{ needs.resolve-vulcan-config.outputs.vulcan_env }}
      bucket: ${{ needs.resolve-vulcan-config.outputs.artifact_bucket }}
      role_to_assume: ${{ needs.resolve-vulcan-config.outputs.artifact_publisher_role_arn }}
      sse_kms_key_id: ${{ needs.resolve-vulcan-config.outputs.artifact_kms_key_id }}
      cloudfront_distribution_id: ${{ needs.resolve-vulcan-config.outputs.artifact_cloudfront_distribution_id }}
      artifact_folder: "."
      artifact_pattern: sima-cli-dist
      artifact_glob: "*"
      min_artifact_count: 5

  e2e-install:
    name: E2E Install (${{ matrix.name }})
    runs-on: ${{ fromJSON(matrix.runs_on) }}
    needs:
      - build
      - publish-vulcan-artifacts
    env:
      GITHUB_TOKEN: ${{ github.token }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: macOS
            runs_on: '["self-hosted","macOS","osx"]'
          - name: Ubuntu x86
            runs_on: '"ubuntu-24.04"'
          - name: Ubuntu x86 Snap Docker
            runs_on: '"ubuntu-24.04"'
            docker_install: snap
          - name: Ubuntu ARM64
            runs_on: '"ubuntu-24.04-arm"'
          - name: Windows
            runs_on: '"windows-latest"'

    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Install workflow sima-cli
        if: runner.os != 'Windows'
        run: |
          set -euo pipefail
          python3 -m venv "${RUNNER_TEMP}/workflow-sima-cli"
          "${RUNNER_TEMP}/workflow-sima-cli/bin/python" -m pip install --upgrade pip
          "${RUNNER_TEMP}/workflow-sima-cli/bin/python" -m pip install .
          echo "${RUNNER_TEMP}/workflow-sima-cli/bin" >> "${GITHUB_PATH}"
          "${RUNNER_TEMP}/workflow-sima-cli/bin/sima-cli" version

      - name: Install workflow sima-cli on native Windows
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          python -m pip install --upgrade pip
          python -m pip install .
          sima-cli version

      - name: Test repo installer script
        if: runner.os != 'Windows'
        run: |
          set -euo pipefail
          export HOME="${RUNNER_TEMP}/repo-installer-home"
          mkdir -p "$HOME"
          bash scripts/install/linux-mac.sh
          "$HOME/.sima-cli/.venv/bin/sima-cli" version

      - name: Test repo installer script on native Windows
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          $ErrorActionPreference = "Stop"
          $env:USERPROFILE = Join-Path $env:RUNNER_TEMP "repo-installer-home"
          New-Item -ItemType Directory -Force -Path $env:USERPROFILE | Out-Null
          cmd.exe /c scripts\install\windows.bat
          & "$env:USERPROFILE\.sima-cli-env\Scripts\sima-cli.exe" version

      - name: Install candidate on native Windows
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          sima-cli install --vulcan --env "${{ vars.VULCAN_ENV || 'dev' }}" "sima-cli@${{ needs.build.outputs.ref_name }}:${{ needs.build.outputs.short_sha }}" --install-dir "$env:RUNNER_TEMP\sima-cli-vulcan-install"
          $versionOutput = & "$env:USERPROFILE\.sima-cli-env\Scripts\sima-cli.exe" version
          $versionOutput
          if (($versionOutput -join "`n") -notlike "*${{ needs.build.outputs.short_sha }}*") {
            throw "Installed sima-cli version does not contain expected build SHA ${{ needs.build.outputs.short_sha }}"
          }

      - name: Set up WSL2 Ubuntu on Windows
        if: runner.os == 'Windows'
        uses: Vampire/setup-wsl@v7
        with:
          distribution: Ubuntu-24.04
          update: "true"
          additional-packages: ca-certificates curl python3 python3-venv python3-pip docker.io

      - name: Verify Docker on Ubuntu
        if: runner.os == 'Linux' && matrix.docker_install != 'snap'
        run: |
          docker info

      - name: Verify Docker on macOS
        if: runner.os == 'macOS'
        run: |
          set -euo pipefail
          for docker_cli_dir in \
            "/Applications/Docker.app/Contents/Resources/bin" \
            "$HOME/.docker/bin" \
            "/opt/homebrew/bin" \
            "/usr/local/bin"; do
            if [[ -d "$docker_cli_dir" ]]; then
              echo "$docker_cli_dir" >> "$GITHUB_PATH"
              export PATH="$docker_cli_dir:$PATH"
            fi
          done
          command -v docker
          docker info

      - name: Install Docker from Snap on Ubuntu
        if: runner.os == 'Linux' && matrix.docker_install == 'snap'
        run: |
          set -euo pipefail
          sudo systemctl stop docker.service docker.socket containerd.service || true
          sudo apt-get update
          sudo apt-get remove -y docker-ce docker-ce-cli containerd.io docker-buildx-plugin docker-compose-plugin moby-engine moby-cli containerd runc || true
          sudo apt-get install -y snapd
          sudo systemctl enable --now snapd.socket
          sudo ln -s /var/lib/snapd/snap /snap 2>/dev/null || true
          sudo snap install docker
          sudo snap start docker
          for _ in $(seq 1 60); do
            if sudo docker info >/dev/null 2>&1; then
              sudo chmod 666 /var/run/docker.sock || true
              docker info
              exit 0
            fi
            sudo snap services docker || true
            sleep 2
          done
          sudo journalctl -u snap.docker.dockerd -n 200 --no-pager || true
          exit 1

      - name: Start Docker in WSL2
        if: runner.os == 'Windows'
        shell: wsl-bash {0}
        run: |
          sudo nohup dockerd > /tmp/dockerd.log 2>&1 &
          for _ in $(seq 1 60); do
            if docker info >/dev/null 2>&1; then
              docker info
              sudo chmod 666 /var/run/docker.sock
              exit 0
            fi
            sleep 2
          done
          cat /tmp/dockerd.log
          exit 1

      - name: Install candidate
        if: runner.os != 'Windows'
        run: |
          set -euo pipefail
          sima-cli install --vulcan --env "${{ vars.VULCAN_ENV || 'dev' }}" "sima-cli@${{ needs.build.outputs.ref_name }}:${{ needs.build.outputs.short_sha }}" --install-dir "${RUNNER_TEMP}/sima-cli-vulcan-install"
          candidate_version="$("$HOME/.sima-cli/.venv/bin/sima-cli" version)"
          printf '%s\n' "$candidate_version"
          grep -F "${{ needs.build.outputs.short_sha }}" <<<"$candidate_version"
          "$HOME/.sima-cli/.venv/bin/sima-cli" install ghcr:sima-neat/sdk
          if [[ "${{ matrix.docker_install }}" == "snap" ]]; then
            mkdir -p "$HOME/.sima-cli"
            printf '{}\n' > "$HOME/.sima-cli/.tokens.json"
            chmod 600 "$HOME/.sima-cli/.tokens.json"
          fi
          docker rm -f ghcr.io-sima-neat-sdk-latest || true
          "$HOME/.sima-cli/.venv/bin/sima-cli" sdk setup -y -n --minimal

      - name: Install candidate in WSL2
        if: runner.os == 'Windows'
        shell: wsl-bash {0}
        run: |
          python3 -m venv /tmp/workflow-sima-cli
          /tmp/workflow-sima-cli/bin/python -m pip install --upgrade pip
          /tmp/workflow-sima-cli/bin/python -m pip install .
          /tmp/workflow-sima-cli/bin/sima-cli version
          /tmp/workflow-sima-cli/bin/sima-cli install --vulcan --env "${{ vars.VULCAN_ENV || 'dev' }}" "sima-cli@${{ needs.build.outputs.ref_name }}:${{ needs.build.outputs.short_sha }}" --install-dir /tmp/sima-cli-vulcan-install
          candidate_version="$("$HOME/.sima-cli/.venv/bin/sima-cli" version)"
          printf '%s\n' "$candidate_version"
          grep -F "${{ needs.build.outputs.short_sha }}" <<<"$candidate_version"
          "$HOME/.sima-cli/.venv/bin/sima-cli" install ghcr:sima-neat/sdk
          docker rm -f ghcr.io-sima-neat-sdk-latest || true
          "$HOME/.sima-cli/.venv/bin/sima-cli" sdk setup -y -n --minimal

  promote-latest:
    name: Promote Tested Latest
    runs-on: ubuntu-latest
    needs:
      - build
      - resolve-vulcan-config
      - e2e-install
    environment: ${{ needs.resolve-vulcan-config.outputs.vulcan_env }}
    env:
      AWS_REGION: ${{ needs.resolve-vulcan-config.outputs.aws_region }}
      ARTIFACT_BUCKET: ${{ needs.resolve-vulcan-config.outputs.artifact_bucket }}
      ROLE_TO_ASSUME: ${{ needs.resolve-vulcan-config.outputs.artifact_publisher_role_arn }}
      SSE_KMS_KEY_ID: ${{ needs.resolve-vulcan-config.outputs.artifact_kms_key_id }}
      CLOUDFRONT_DISTRIBUTION_ID: ${{ needs.resolve-vulcan-config.outputs.artifact_cloudfront_distribution_id }}

    steps:
      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v6
        with:
          aws-region: ${{ needs.resolve-vulcan-config.outputs.aws_region }}
          role-to-assume: ${{ needs.resolve-vulcan-config.outputs.artifact_publisher_role_arn }}
          role-session-name: vulcan-promote-${{ github.run_id }}

      - name: Promote commit as latest
        run: |
          set -euo pipefail
          mkdir -p _vulcan/promote
          printf '%s\n' "${{ needs.build.outputs.short_sha }}" > _vulcan/promote/latest.tag

          s3_args=(--content-type text/plain --sse aws:kms)
          if [[ -n "${SSE_KMS_KEY_ID:-}" ]]; then
            s3_args+=(--sse-kms-key-id "${SSE_KMS_KEY_ID}")
          fi

          aws s3 cp \
            _vulcan/promote/latest.tag \
            "s3://${ARTIFACT_BUCKET}/sima-cli/${{ needs.build.outputs.branch_key }}/latest.tag" \
            "${s3_args[@]}"

          if [[ -n "${CLOUDFRONT_DISTRIBUTION_ID:-}" ]]; then
            aws cloudfront create-invalidation \
              --distribution-id "${CLOUDFRONT_DISTRIBUTION_ID}" \
              --paths "/sima-cli/${{ needs.build.outputs.branch_key }}/latest.tag"
          fi
