name: Release

on:
  workflow_dispatch:
    inputs:
      tag_name:
        description: Release tag to create, for example v2.1.5
        required: true
        type: string

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

permissions:
  contents: write

jobs:
  create-release:
    name: Create Draft Release
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Validate release tag
        id: tag
        run: |
          set -euo pipefail
          tag="${{ inputs.tag_name }}"
          if [[ ! "${tag}" =~ ^v[0-9]+\.[0-9]+\.[0-9]+([._-][0-9A-Za-z]+)*$ ]]; then
            echo "Release tag must look like v2.1.5, got: ${tag}" >&2
            exit 1
          fi
          if git rev-parse -q --verify "refs/tags/${tag}" >/dev/null; then
            echo "Tag already exists locally: ${tag}" >&2
            exit 1
          fi
          if git ls-remote --exit-code --tags origin "refs/tags/${tag}" >/dev/null 2>&1; then
            echo "Tag already exists on origin: ${tag}" >&2
            exit 1
          fi
          echo "tag=${tag}" >> "${GITHUB_OUTPUT}"

      - name: Create and push tag
        run: |
          set -euo pipefail
          tag="${{ steps.tag.outputs.tag }}"
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git tag -a "${tag}" -m "Release ${tag}"
          git push origin "refs/tags/${tag}"

      - name: Create draft release with generated notes
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail
          tag="${{ steps.tag.outputs.tag }}"
          gh release create "${tag}" \
            --draft \
            --generate-notes \
            --title "${tag}" \
            --verify-tag

      - name: Build trigger note
        run: |
          echo "Pushed ${{ steps.tag.outputs.tag }}. The Build workflow is triggered by the tag push."
